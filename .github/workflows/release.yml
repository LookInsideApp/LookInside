name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to stamp into the release build, for example 2.2.0.
        required: true
        type: string
      publish_appcast:
        description: Publish the signed app to the Sparkle appcast.
        required: false
        default: false
        type: boolean
      publish_release:
        description: Create or update the GitHub release for a manual run.
        required: false
        default: false
        type: boolean
      prune_appcast_versions:
        description: Comma-separated versions to remove from the Sparkle appcast before signing.
        required: false
        default: ""
        type: string
      prune_appcast_deltas:
        description: Remove existing Sparkle delta archives while pruning the appcast.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.actor == 'Lakr233'
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.context.outputs.build_version }}
      build_number: ${{ steps.context.outputs.build_number }}
      publish_release: ${{ steps.context.outputs.publish_release }}
      publish_appcast: ${{ steps.context.outputs.publish_appcast }}
      artifact_name: ${{ steps.context.outputs.artifact_name }}
      prune_appcast_versions: ${{ steps.context.outputs.prune_appcast_versions }}
      prune_appcast_deltas: ${{ steps.context.outputs.prune_appcast_deltas }}

    steps:
      - name: Validate Trigger Actor
        run: |
          if [[ "${GITHUB_ACTOR}" != "Lakr233" ]]; then
            echo "Only Lakr233 may run the Release workflow." >&2
            exit 1
          fi

      - name: Resolve Build Context
        id: context
        run: |
          set -euo pipefail
          APPCAST_URL="https://lookinside-app.com/appcast.xml"
          APPCAST_PATH="${RUNNER_TEMP}/lookinside-appcast.xml"
          curl -fsSL "${APPCAST_URL}" -o "${APPCAST_PATH}"
          BUILD_NUMBER="$(
            python3 - "${APPCAST_PATH}" <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          root = ET.parse(sys.argv[1]).getroot()
          sparkle_ns = "{http://www.andymatuschak.org/xml-namespaces/sparkle}"
          versions = []

          def collect(value):
              value = (value or "").strip()
              if value.isdecimal():
                  versions.append(int(value))

          for element in root.iter():
              if element.tag == f"{sparkle_ns}version":
                  collect(element.text)
              collect(element.attrib.get(f"{sparkle_ns}version"))

          print((max(versions) if versions else 0) + 1)
          PY
          )"
          if [[ ! "${BUILD_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "Could not resolve next Sparkle build number from ${APPCAST_URL}." >&2
            exit 1
          fi
          echo "Resolved Sparkle build number ${BUILD_NUMBER} from ${APPCAST_URL}."
          echo "build_number=${BUILD_NUMBER}" >> "${GITHUB_OUTPUT}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "build_version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "publish_release=true" >> "${GITHUB_OUTPUT}"
            echo "publish_appcast=true" >> "${GITHUB_OUTPUT}"
            echo "artifact_name=LookInside-${GITHUB_REF_NAME}-release" >> "${GITHUB_OUTPUT}"
            echo "prune_appcast_versions=" >> "${GITHUB_OUTPUT}"
            echo "prune_appcast_deltas=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          VERSION="${{ inputs.version }}"
          PUBLISH_APPCAST="${{ inputs.publish_appcast }}"
          PUBLISH_RELEASE="${{ inputs.publish_release }}"
          PRUNE_APPCAST_VERSIONS="${{ inputs.prune_appcast_versions }}"
          PRUNE_APPCAST_DELTAS="${{ inputs.prune_appcast_deltas }}"
          if [[ ! "${VERSION}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Manual run version must match x.y.z or vX.Y.Z" >&2
            exit 1
          fi
          if [[ "${PUBLISH_APPCAST}" != "true" && "${PUBLISH_APPCAST}" != "false" ]]; then
            echo "publish_appcast must be true or false." >&2
            exit 1
          fi
          if [[ "${PUBLISH_RELEASE}" != "true" && "${PUBLISH_RELEASE}" != "false" ]]; then
            echo "publish_release must be true or false." >&2
            exit 1
          fi
          if [[ "${PRUNE_APPCAST_DELTAS}" != "true" && "${PRUNE_APPCAST_DELTAS}" != "false" ]]; then
            echo "prune_appcast_deltas must be true or false." >&2
            exit 1
          fi

          echo "build_version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "publish_release=${PUBLISH_RELEASE}" >> "${GITHUB_OUTPUT}"
          echo "publish_appcast=${PUBLISH_APPCAST}" >> "${GITHUB_OUTPUT}"
          echo "prune_appcast_versions=${PRUNE_APPCAST_VERSIONS}" >> "${GITHUB_OUTPUT}"
          echo "prune_appcast_deltas=${PRUNE_APPCAST_DELTAS}" >> "${GITHUB_OUTPUT}"
          if [[ "${PUBLISH_APPCAST}" == "true" ]]; then
            echo "artifact_name=LookInside-${VERSION}-release" >> "${GITHUB_OUTPUT}"
          else
            echo "artifact_name=LookInside-${VERSION}-notarize-test" >> "${GITHUB_OUTPUT}"
          fi

  build_package:
    needs: prepare
    runs-on: macos-26
    timeout-minutes: 90
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.0.app/Contents/Developer
      SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
      RELEASE_BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
      GIT_TERMINAL_PROMPT: "0"
      GCM_INTERACTIVE: "Never"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Validate Sparkle Public Key
        run: |
          set -euo pipefail
          if [[ -z "${SPARKLE_PUBLIC_ED_KEY}" ]]; then
            echo "SPARKLE_PUBLIC_ED_KEY secret is required for release builds." >&2
            exit 1
          fi

      - name: Checkout Injector Daemon
        env:
          LOOKINSIDE_INJECTOR_READ_TOKEN: ${{ secrets.LOOKINSIDE_INJECTOR_READ_TOKEN || secrets.LOOKINSIDE_WEB_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${LOOKINSIDE_INJECTOR_READ_TOKEN}" ]]; then
            echo "LOOKINSIDE_INJECTOR_READ_TOKEN or LOOKINSIDE_WEB_RELEASE_TOKEN is required to checkout LookInside-Injector." >&2
            exit 1
          fi
          git clone --depth 1 \
            "https://x-access-token:${LOOKINSIDE_INJECTOR_READ_TOKEN}@github.com/LookInsideApp/LookInside-Injector.git" \
            ../LookInside-Injector

      - name: Configure Private Package Access
        env:
          LOOKINSIDE_PRIVATE_READ_TOKEN: ${{ secrets.LOOKINSIDE_PRIVATE_READ_TOKEN || secrets.LOOKINSIDE_WEB_RELEASE_TOKEN || secrets.LOOKINSIDE_INJECTOR_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${LOOKINSIDE_PRIVATE_READ_TOKEN}" ]]; then
            echo "LOOKINSIDE_PRIVATE_READ_TOKEN, LOOKINSIDE_WEB_RELEASE_TOKEN, or LOOKINSIDE_INJECTOR_READ_TOKEN is required for private SwiftPM packages." >&2
            exit 1
          fi
          git config --global \
            url."https://x-access-token:${LOOKINSIDE_PRIVATE_READ_TOKEN}@github.com/LookInsideApp/".insteadOf \
            "https://github.com/LookInsideApp/"

      - name: Generate Xcode Configuration
        run: |
          bash Scripts/write-github-action-xcconfig.sh \
            --version "${{ needs.prepare.outputs.build_version }}" \
            --build-number "${RELEASE_BUILD_NUMBER}"

      - name: Archive App
        timeout-minutes: 60
        run: |
          bash Scripts/build-release-from-tag.sh \
            --tag "${{ needs.prepare.outputs.build_version }}" \
            --stage archive-app

      - name: Package Unsigned Archive
        run: |
          set -euo pipefail
          release_dir="build/releases/${{ needs.prepare.outputs.build_version }}"
          tar -czf "${release_dir}/LookInside.xcarchive.tar.gz" \
            -C "${release_dir}" \
            LookInside.xcarchive

      - name: Upload Unsigned Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lookinside-${{ needs.prepare.outputs.build_version }}-unsigned
          path: build/releases/${{ needs.prepare.outputs.build_version }}/LookInside.xcarchive.tar.gz
          if-no-files-found: error
          retention-days: 7

  sign_notarize_app:
    needs: [prepare, build_package]
    runs-on: macos-26
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.0.app/Contents/Developer
      PRESERVE_KEYCHAIN_STATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Unsigned Artifacts
        uses: actions/download-artifact@v4
        with:
          name: lookinside-${{ needs.prepare.outputs.build_version }}-unsigned
          path: build/releases/${{ needs.prepare.outputs.build_version }}

      - name: Extract Unsigned Archive
        run: |
          set -euo pipefail
          release_dir="build/releases/${{ needs.prepare.outputs.build_version }}"
          tar -xzf "${release_dir}/LookInside.xcarchive.tar.gz" \
            -C "${release_dir}"

      - name: Setup Keychain and Signing Env
        id: setup_keychain
        env:
          KEYCHAIN_CONTENT_GZIP: ${{ secrets.KEYCHAIN_CONTENT_GZIP }}
          KEYCHAIN_SECRET: ${{ secrets.KEYCHAIN_SECRET }}
        run: |
          bash Scripts/setup-ci-keychain.sh --output-file "${GITHUB_OUTPUT}"

      - name: Sign App
        timeout-minutes: 15
        env:
          SIGNING_IDENTITY: ${{ steps.setup_keychain.outputs.signing_identity }}
          DEVELOPMENT_TEAM: ${{ steps.setup_keychain.outputs.development_team }}
          KEYCHAIN_PATH: ${{ steps.setup_keychain.outputs.keychain_path }}
          KEYCHAIN_PROFILE: ${{ steps.setup_keychain.outputs.keychain_profile }}
          KEYCHAIN_SECRET: ${{ secrets.KEYCHAIN_SECRET }}
        run: |
          bash Scripts/build-release-from-tag.sh \
            --tag "${{ needs.prepare.outputs.build_version }}" \
            --stage sign-app

      - name: Notarize App
        timeout-minutes: 30
        env:
          SIGNING_IDENTITY: ${{ steps.setup_keychain.outputs.signing_identity }}
          DEVELOPMENT_TEAM: ${{ steps.setup_keychain.outputs.development_team }}
          KEYCHAIN_PATH: ${{ steps.setup_keychain.outputs.keychain_path }}
          KEYCHAIN_PROFILE: ${{ steps.setup_keychain.outputs.keychain_profile }}
          KEYCHAIN_SECRET: ${{ secrets.KEYCHAIN_SECRET }}
        run: |
          bash Scripts/build-release-from-tag.sh \
            --tag "${{ needs.prepare.outputs.build_version }}" \
            --stage notarize-app

      - name: Upload Notarized App
        uses: actions/upload-artifact@v4
        with:
          name: lookinside-${{ needs.prepare.outputs.build_version }}-app
          path: build/releases/${{ needs.prepare.outputs.build_version }}/LookInside-*-macOS-app.zip
          if-no-files-found: error
          retention-days: 14

  collect_release:
    needs: [prepare, sign_notarize_app]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Download App Artifact
        uses: actions/download-artifact@v4
        with:
          name: lookinside-${{ needs.prepare.outputs.build_version }}-app
          path: dist

      - name: Generate Checksums
        run: |
          cd dist
          shasum -a 256 *.zip > checksums.txt

      - name: Upload Notarized Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: |
            dist/*.zip
            dist/checksums.txt
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: needs.prepare.outputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.build_version }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/checksums.txt

  publish_appcast:
    needs: [prepare, collect_release]
    if: needs.prepare.outputs.publish_appcast == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.0.app/Contents/Developer

    steps:
      - name: Checkout App Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: app

      - name: Download Release Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: dist

      - name: Resolve App Zip
        id: artifact
        run: |
          set -euo pipefail
          app_zip="$(find dist -maxdepth 1 -type f -name 'LookInside-*-macOS-app.zip' -print -quit)"
          if [[ -z "$app_zip" ]]; then
            echo "No LookInside app zip found in release artifact." >&2
            exit 1
          fi
          echo "app_zip=$app_zip" >> "$GITHUB_OUTPUT"

      - name: Validate Sparkle Publishing Secrets
        env:
          LOOKINSIDE_WEB_RELEASE_TOKEN: ${{ secrets.LOOKINSIDE_WEB_RELEASE_TOKEN }}
          LOOKINSIDE_SECRETS_READ_TOKEN: ${{ secrets.LOOKINSIDE_SECRETS_READ_TOKEN }}
          SPARKLE_PRIVATE_KEY_GPG_PASSPHRASE: ${{ secrets.SPARKLE_PRIVATE_KEY_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          [[ -n "$LOOKINSIDE_WEB_RELEASE_TOKEN" ]] || { echo "LOOKINSIDE_WEB_RELEASE_TOKEN secret is required." >&2; exit 1; }
          [[ -n "$LOOKINSIDE_SECRETS_READ_TOKEN" ]] || { echo "LOOKINSIDE_SECRETS_READ_TOKEN secret is required." >&2; exit 1; }
          [[ -n "$SPARKLE_PRIVATE_KEY_GPG_PASSPHRASE" ]] || { echo "SPARKLE_PRIVATE_KEY_GPG_PASSPHRASE secret is required." >&2; exit 1; }

      - name: Checkout Web Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.WEB_TARGET_REPO }}
          ref: main
          path: web
          token: ${{ secrets.LOOKINSIDE_WEB_RELEASE_TOKEN }}

      - name: Checkout Secrets Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SECRETS_SOURCE_REPO }}
          ref: main
          path: secrets
          token: ${{ secrets.LOOKINSIDE_SECRETS_READ_TOKEN }}

      - name: Export GitHub Release Notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.prepare.outputs.publish_release }}" == "true" ]]; then
            gh release view "${{ needs.prepare.outputs.build_version }}" \
              --repo "${{ github.repository }}" \
              --json body \
              --jq '.body // ""' > "$RUNNER_TEMP/release-notes.md"
          fi
          if [[ ! -f "$RUNNER_TEMP/release-notes.md" || ! -s "$RUNNER_TEMP/release-notes.md" ]]; then
            printf '# LookInside %s\n\nSparkle update build.\n' "${{ needs.prepare.outputs.build_version }}" > "$RUNNER_TEMP/release-notes.md"
          fi

      - name: Decrypt Sparkle Private Key
        env:
          SPARKLE_PRIVATE_KEY_GPG_PASSPHRASE: ${{ secrets.SPARKLE_PRIVATE_KEY_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          command -v gpg >/dev/null 2>&1 || brew install gnupg
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$SPARKLE_PRIVATE_KEY_GPG_PASSPHRASE" \
            --decrypt secrets/sparkle/private-ed-key.txt.gpg > "$RUNNER_TEMP/sparkle-private-ed-key.txt"
          chmod 600 "$RUNNER_TEMP/sparkle-private-ed-key.txt"

      - name: Install Sparkle Tools
        id: sparkle
        run: |
          set -euo pipefail
          tools_dir="$(bash app/Scripts/install-sparkle-tools.sh --version 2.9.1)"
          echo "tools_dir=$tools_dir" >> "$GITHUB_OUTPUT"

      - name: Publish Appcast Into Web Repository
        env:
          PRUNE_APPCAST_VERSIONS: ${{ needs.prepare.outputs.prune_appcast_versions }}
          PRUNE_APPCAST_DELTAS: ${{ needs.prepare.outputs.prune_appcast_deltas }}
          ASSET_DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare.outputs.build_version }}/LookInside-${{ needs.prepare.outputs.build_version }}-macOS-app.zip
        run: |
          set -euo pipefail
          bash app/Scripts/publish-sparkle-appcast-to-web.sh \
            --web-dir web \
            --app-zip "${{ steps.artifact.outputs.app_zip }}" \
            --private-key-file "$RUNNER_TEMP/sparkle-private-ed-key.txt" \
            --sparkle-tools-dir "${{ steps.sparkle.outputs.tools_dir }}" \
            --release-notes-file "$RUNNER_TEMP/release-notes.md" \
            --version "${{ needs.prepare.outputs.build_version }}" \
            --asset-download-url "$ASSET_DOWNLOAD_URL"

      - name: Commit Web Appcast
        working-directory: web
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/appcast.xml public/downloads/manifest.json public/downloads/lookinside
          if git diff --cached --quiet; then
            echo "No Web appcast changes to publish."
            exit 0
          fi
          git commit -m "Publish LookInside ${{ needs.prepare.outputs.build_version }} appcast"
          git push origin HEAD:main
